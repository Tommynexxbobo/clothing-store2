<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THREADS - Clothing Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="app"></div>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const SAMPLE_PRODUCTS = [
            { id: 1, name: 'Premium Cotton T-Shirt', category: 'tops', price: 29.99, image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&h=500&fit=crop', color: 'White', size: 'M', rating: 4.5, reviews: 24, description: 'Soft, breathable 100% cotton tee' },
            { id: 2, name: 'Slim Fit Jeans', category: 'bottoms', price: 59.99, image: 'https://images.unsplash.com/photo-1542272604-787c62d465d1?w=400&h=500&fit=crop', color: 'Dark Blue', size: 'L', rating: 4.8, reviews: 45, description: 'Classic denim with modern fit' },
            { id: 3, name: 'Leather Jacket', category: 'outerwear', price: 129.99, image: 'https://images.unsplash.com/photo-1551028719-00167b16ebc5?w=400&h=500&fit=crop', color: 'Black', size: 'M', rating: 4.9, reviews: 67, description: 'Premium leather with vintage style' },
            { id: 4, name: 'Casual Hoodie', category: 'tops', price: 49.99, image: 'https://images.unsplash.com/photo-1556821552-5282d27db003?w=400&h=500&fit=crop', color: 'Gray', size: 'L', rating: 4.6, reviews: 38, description: 'Cozy fleece-lined hoodie' },
            { id: 5, name: 'Chino Pants', category: 'bottoms', price: 54.99, image: 'https://images.unsplash.com/photo-1473621038790-b3a47b6c1546?w=400&h=500&fit=crop', color: 'Khaki', size: 'M', rating: 4.4, reviews: 22, description: 'Versatile everyday chinos' },
            { id: 6, name: 'Wool Sweater', category: 'tops', price: 69.99, image: 'https://images.unsplash.com/photo-1578507065211-156f1b1b1f86?w=400&h=500&fit=crop', color: 'Navy', size: 'S', rating: 4.7, reviews: 31, description: 'Warm merino wool blend' },
            { id: 7, name: 'Summer Shorts', category: 'bottoms', price: 34.99, image: 'https://images.unsplash.com/photo-1591894872535-585b8bb4b986?w=400&h=500&fit=crop', color: 'Olive', size: 'M', rating: 4.3, reviews: 18, description: 'Lightweight and breathable' },
            { id: 8, name: 'Bomber Jacket', category: 'outerwear', price: 89.99, image: 'https://images.unsplash.com/photo-1551028719-00167b16ebc5?w=400&h=500&fit=crop', color: 'Black', size: 'L', rating: 4.6, reviews: 29, description: 'Modern streetwear bomber' },
        ];

        function App() {
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('all');
            const [priceRange, setPriceRange] = useState([0, 150]);
            const [showCart, setShowCart] = useState(false);
            const [showCheckout, setShowCheckout] = useState(false);
            const [customerInfo, setCustomerInfo] = useState({ name: '', email: '', address: '' });
            const [showFilters, setShowFilters] = useState(false);

            const filteredProducts = useMemo(() => {
                return SAMPLE_PRODUCTS.filter(product => {
                    const matchesSearch = product.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                        product.description.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesCategory = selectedCategory === 'all' || product.category === selectedCategory;
                    const matchesPrice = product.price >= priceRange[0] && product.price <= priceRange[1];
                    return matchesSearch && matchesCategory && matchesPrice;
                });
            }, [searchTerm, selectedCategory, priceRange]);

            const categories = ['all', 'tops', 'bottoms', 'outerwear'];
            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const addToCart = (product) => {
                setCart(prevCart => {
                    const existing = prevCart.find(item => item.id === product.id);
                    if (existing) {
                        return prevCart.map(item =>
                            item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
                        );
                    }
                    return [...prevCart, { ...product, quantity: 1 }];
                });
            };

            const removeFromCart = (productId) => {
                setCart(prevCart => prevCart.filter(item => item.id !== productId));
            };

            const updateQuantity = (productId, quantity) => {
                if (quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    setCart(prevCart =>
                        prevCart.map(item =>
                            item.id === productId ? { ...item, quantity } : item
                        )
                    );
                }
            };

            const handleCheckout = () => {
                if (customerInfo.name && customerInfo.email && customerInfo.address) {
                    alert(`Order placed! Total: $${cartTotal.toFixed(2)}\n\nIn a real store, this would connect to Stripe for payment.`);
                    setCart([]);
                    setShowCheckout(false);
                    setCustomerInfo({ name: '', email: '', address: '' });
                } else {
                    alert('Please fill in all fields');
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
                    <header className="sticky top-0 z-40 bg-slate-900/95 backdrop-blur border-b border-slate-700/50">
                        <div className="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
                            <div className="flex items-center justify-between gap-4">
                                <h1 className="text-2xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">
                                    THREADS
                                </h1>
                                <div className="flex-1 max-w-md">
                                    <div className="relative">
                                        <input
                                            type="text"
                                            placeholder="Search products..."
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            className="w-full pl-10 pr-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-amber-400 transition"
                                        />
                                    </div>
                                </div>
                                <button
                                    onClick={() => setShowCart(!showCart)}
                                    className="relative p-2 rounded-lg bg-slate-800 hover:bg-slate-700 transition text-amber-400"
                                >
                                    🛒
                                    {cart.length > 0 && (
                                        <span className="absolute -top-2 -right-2 w-5 h-5 bg-red-500 rounded-full flex items-center justify-center text-xs text-white font-bold">
                                            {cart.length}
                                        </span>
                                    )}
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                            <div className={`${showFilters ? 'block' : 'hidden'} lg:block lg:col-span-1`}>
                                <div className="sticky top-24 space-y-6">
                                    <div className="bg-slate-800/50 border border-slate-700 rounded-lg p-4">
                                        <h3 className="font-semibold text-white mb-3">Category</h3>
                                        <div className="space-y-2">
                                            {categories.map(cat => (
                                                <button
                                                    key={cat}
                                                    onClick={() => setSelectedCategory(cat)}
                                                    className={`w-full text-left px-3 py-2 rounded-lg transition capitalize ${
                                                        selectedCategory === cat
                                                            ? 'bg-amber-400 text-slate-900 font-semibold'
                                                            : 'text-slate-300 hover:text-white hover:bg-slate-700/50'
                                                    }`}
                                                >
                                                    {cat === 'all' ? 'All Products' : cat}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-slate-800/50 border border-slate-700 rounded-lg p-4">
                                        <h3 className="font-semibold text-white mb-3">Price Range</h3>
                                        <div className="space-y-3">
                                            <input
                                                type="range"
                                                min="0"
                                                max="150"
                                                value={priceRange[1]}
                                                onChange={(e) => setPriceRange([priceRange[0], parseInt(e.target.value)])}
                                                className="w-full accent-amber-400"
                                            />
                                            <div className="flex justify-between text-sm text-slate-300">
                                                <span>${priceRange[0]}</span>
                                                <span>${priceRange[1]}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-3">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-xl font-bold text-white">
                                        {filteredProducts.length} Products
                                    </h2>
                                    <button
                                        onClick={() => setShowFilters(!showFilters)}
                                        className="lg:hidden px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white hover:bg-slate-700 transition"
                                    >
                                        🔍 Filters
                                    </button>
                                </div>

                                {filteredProducts.length === 0 ? (
                                    <div className="text-center py-12">
                                        <p className="text-slate-400 text-lg">No products found. Try adjusting your filters.</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {filteredProducts.map(product => (
                                            <div
                                                key={product.id}
                                                className="group bg-slate-800/50 border border-slate-700 rounded-lg overflow-hidden hover:border-amber-400/50 transition-all duration-300 hover:shadow-lg hover:shadow-amber-400/10"
                                            >
                                                <div className="relative overflow-hidden bg-slate-700 h-64 sm:h-72">
                                                    <img
                                                        src={product.image}
                                                        alt={product.name}
                                                        className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                                                    />
                                                    <div className="absolute top-3 right-3 bg-amber-400 text-slate-900 px-3 py-1 rounded-full text-sm font-semibold">
                                                        ${product.price}
                                                    </div>
                                                </div>

                                                <div className="p-4 space-y-3">
                                                    <h3 className="font-bold text-white group-hover:text-amber-400 transition">
                                                        {product.name}
                                                    </h3>
                                                    <p className="text-sm text-slate-400">{product.description}</p>

                                                    <div className="flex items-center gap-2">
                                                        <div className="flex items-center gap-1">
                                                            {[...Array(5)].map((_, i) => (
                                                                <span key={i} className={i < Math.floor(product.rating) ? "text-amber-400" : "text-slate-600"}>★</span>
                                                            ))}
                                                        </div>
                                                        <span className="text-sm text-slate-400">
                                                            {product.rating} ({product.reviews})
                                                        </span>
                                                    </div>

                                                    <div className="grid grid-cols-2 gap-2 text-xs">
                                                        <div className="bg-slate-700/50 rounded px-2 py-1 text-slate-300">
                                                            <span className="text-slate-400">Color:</span> {product.color}
                                                        </div>
                                                        <div className="bg-slate-700/50 rounded px-2 py-1 text-slate-300">
                                                            <span className="text-slate-400">Size:</span> {product.size}
                                                        </div>
                                                    </div>

                                                    <button
                                                        onClick={() => addToCart(product)}
                                                        className="w-full mt-2 px-4 py-2 bg-gradient-to-r from-amber-400 to-orange-500 text-slate-900 font-semibold rounded-lg hover:shadow-lg hover:shadow-amber-400/50 transition-all duration-200 transform hover:scale-105"
                                                    >
                                                        Add to Cart
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {showCart && (
                        <div className="fixed inset-0 z-50 overflow-hidden">
                            <div className="absolute inset-0 bg-black/50 backdrop-blur" onClick={() => setShowCart(false)} />
                            <div className="absolute right-0 top-0 h-full w-full sm:w-96 bg-slate-900 border-l border-slate-700 overflow-y-auto">
                                <div className="p-6 space-y-6">
                                    <div className="flex items-center justify-between">
                                        <h2 className="text-xl font-bold text-white">Shopping Cart</h2>
                                        <button
                                            onClick={() => setShowCart(false)}
                                            className="p-1 hover:bg-slate-800 rounded-lg transition"
                                        >
                                            ✕
                                        </button>
                                    </div>

                                    {cart.length === 0 ? (
                                        <p className="text-slate-400 text-center py-8">Your cart is empty</p>
                                    ) : (
                                        <>
                                            <div className="space-y-4 max-h-96 overflow-y-auto">
                                                {cart.map(item => (
                                                    <div key={item.id} className="bg-slate-800/50 border border-slate-700 rounded-lg p-3 space-y-2">
                                                        <div className="flex items-start justify-between">
                                                            <div className="flex-1">
                                                                <h4 className="font-semibold text-white text-sm">{item.name}</h4>
                                                                <p className="text-xs text-slate-400">${item.price}</p>
                                                            </div>
                                                            <button
                                                                onClick={() => removeFromCart(item.id)}
                                                                className="p-1 hover:bg-red-500/20 rounded transition"
                                                            >
                                                                ✕
                                                            </button>
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <button
                                                                onClick={() => updateQuantity(item.id, item.quantity - 1)}
                                                                className="p-1 hover:bg-slate-700 rounded transition"
                                                            >
                                                                −
                                                            </button>
                                                            <span className="flex-1 text-center text-white">{item.quantity}</span>
                                                            <button
                                                                onClick={() => updateQuantity(item.id, item.quantity + 1)}
                                                                className="p-1 hover:bg-slate-700 rounded transition"
                                                            >
                                                                +
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>

                                            <div className="border-t border-slate-700 pt-4 space-y-3">
                                                <div className="flex justify-between text-lg font-bold text-white">
                                                    <span>Total:</span>
                                                    <span className="text-amber-400">${cartTotal.toFixed(2)}</span>
                                                </div>
                                                <button
                                                    onClick={() => setShowCheckout(true)}
                                                    className="w-full px-4 py-3 bg-gradient-to-r from-amber-400 to-orange-500 text-slate-900 font-bold rounded-lg hover:shadow-lg hover:shadow-amber-400/50 transition-all"
                                                >
                                                    Proceed to Checkout
                                                </button>
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {showCheckout && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/50 backdrop-blur" onClick={() => setShowCheckout(false)} />
                            <div className="relative bg-slate-900 border border-slate-700 rounded-lg p-6 w-full max-w-md space-y-4 max-h-96 overflow-y-auto">
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-xl font-bold text-white">Checkout</h2>
                                    <button onClick={() => setShowCheckout(false)}>
                                        ✕
                                    </button>
                                </div>

                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-semibold text-white mb-2">Full Name</label>
                                        <input
                                            type="text"
                                            value={customerInfo.name}
                                            onChange={(e) => setCustomerInfo({ ...customerInfo, name: e.target.value })}
                                            className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-amber-400"
                                            placeholder="John Doe"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-white mb-2">Email</label>
                                        <input
                                            type="email"
                                            value={customerInfo.email}
                                            onChange={(e) => setCustomerInfo({ ...customerInfo, email: e.target.value })}
                                            className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-amber-400"
                                            placeholder="john@example.com"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-white mb-2">Address</label>
                                        <input
                                            type="text"
                                            value={customerInfo.address}
                                            onChange={(e) => setCustomerInfo({ ...customerInfo, address: e.target.value })}
                                            className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-amber-400"
                                            placeholder="123 Main St, City, State"
                                        />
                                    </div>

                                    <div className="bg-slate-800/50 border border-slate-700 rounded-lg p-4 space-y-2">
                                        <div className="flex justify-between text-white">
                                            <span>Subtotal:</span>
                                            <span>${cartTotal.toFixed(2)}</span>
                                        </div>
                                        <div className="flex justify-between text-white">
                                            <span>Shipping:</span>
                                            <span>$10.00</span>
                                        </div>
                                        <div className="border-t border-slate-700 pt-2 flex justify-between text-lg font-bold text-amber-400">
                                            <span>Total:</span>
                                            <span>${(cartTotal + 10).toFixed(2)}</span>
                                        </div>
                                    </div>

                                    <button
                                        onClick={handleCheckout}
                                        className="w-full px-4 py-3 bg-gradient-to-r from-amber-400 to-orange-500 text-slate-900 font-bold rounded-lg hover:shadow-lg hover:shadow-amber-400/50 transition-all"
                                    >
                                        Complete Purchase
                                    </button>
                                    <button
                                        onClick={() => setShowCheckout(false)}
                                        className="w-full px-4 py-2 bg-slate-800 border border-slate-700 text-white rounded-lg hover:bg-slate-700 transition"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
